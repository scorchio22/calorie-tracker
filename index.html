<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* Custom dropdown list */
    .dropdown-list {
      position: absolute;
      background: white;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      max-height: 150px;
      overflow-y: auto;
      width: 100%;
      z-index: 10;
    }
    .dropdown-item {
      padding: 0.5rem;
      cursor: pointer;
    }
    .dropdown-item:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex flex-col items-center p-4 sm:p-6 md:p-8">

<div class="w-full max-w-xl flex-1">

<h1 class="text-4xl font-extrabold text-center mb-6 text-gray-800">
  Calorie Tracker
</h1>

<div id="days" class="space-y-5"></div>

<h2 id="weeklyTotal" class="text-2xl font-semibold text-center mt-8 text-gray-700 break-words"></h2>

<div class="mt-6 bg-white p-5 rounded-2xl shadow-lg overflow-x-auto">
  <h3 class="font-bold text-lg mb-3 text-gray-800">Weekly Summary</h3>
  <table class="min-w-full text-sm text-gray-700">
    <tbody id="summaryTable"></tbody>
  </table>
</div>

</div>

<div class="w-full flex justify-center p-4">
  <button class="bg-red-500 text-white py-2 px-4 rounded-xl shadow hover:bg-red-600 transition"
    onclick="resetWeek()">
    Reset Week
  </button>
</div>

<script>
const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const foods = {
  "apple": 52,"banana": 89,"chicken": 165,"egg": 78,"rice": 130,
  "potato": 77,"salmon": 206,"broccoli": 34,"carrot": 41,
  "bread": 265,"cheese": 402,"milk": 61
};
let data = JSON.parse(localStorage.getItem("calories")) || {};
let dailyGoals = JSON.parse(localStorage.getItem("dailyGoals")) || {};
let prevPercents = {};

function render() {
  let html = "";
  let weeklyTotal = 0;
  let summaryHTML = "";

  days.forEach(day => {
    let entries = data[day] || [];
    let total = entries.reduce((a,b)=>a+b.cal,0);
    weeklyTotal += total;

    let goal = dailyGoals[day] || 0;
    let percent = goal ? (total/goal)*100 : 0;
    let prev = prevPercents[day] || 0;
    prevPercents[day] = percent;

    let color = "bg-green-400";
    if(percent >= 80 && percent < 100) color = "bg-yellow-400";
    if(percent >= 100) color = "bg-red-500";

    summaryHTML += `<tr class="border-b"><td class="py-1">${day}</td><td>${total}</td></tr>`;

    html += `
      <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-lg relative w-full">
        <div class="flex justify-between items-center mb-2 sm:mb-3">
          <span class="font-semibold text-lg text-gray-800">${day}</span>
          <span class="text-gray-600">${total} cal</span>
        </div>

        <input type="number" placeholder="Daily goal"
          class="border border-gray-200 p-2 rounded-lg w-full mb-2 sm:mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400 text-base sm:text-lg"
          value="${goal || ''}"
          onchange="setDailyGoal('${day}', this.value)">

        <div class="w-full bg-gray-200 h-3 rounded-full mb-1 overflow-hidden">
          <div id="${day}-progress" class="${color} h-3 rounded-full" style="width:${prev}%"></div>
        </div>
        <div class="text-xs text-gray-500 mb-3">${Math.round(percent||0)}%</div>

        <!-- Food + Grams Row -->
        <div class="flex flex-wrap gap-2 items-center mb-2 relative">

          <!-- Food dropdown + search -->
          <div class="flex-1 relative">
            <input type="text" placeholder="Search food" id="${day}-input"
              class="border border-gray-200 p-3 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-blue-400 text-base sm:text-lg"
              oninput="filterDropdown('${day}', this.value)"
              onclick="toggleDropdown('${day}')"
              autocomplete="off">
            <div id="${day}-dropdown" class="dropdown-list hidden"></div>
          </div>

          <select id="${day}-grams" class="border border-gray-200 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-base sm:text-lg">
            ${Array.from({length:21},(_,i)=>i*50).map(g=>`<option value="${g}">${g} g</option>`).join('')}
          </select>

          <input type="number" id="${day}-custom-grams" placeholder="Custom g"
            class="border border-gray-200 p-3 rounded-lg w-20 focus:outline-none focus:ring-2 focus:ring-blue-400 text-base sm:text-lg">

          <button class="bg-blue-500 text-white py-2 px-3 rounded-xl shadow hover:bg-blue-600 transition text-base sm:text-lg"
            onclick="addFood('${day}')">Add</button>
        </div>

        <ul class="text-sm mt-3 space-y-1">
          ${entries.map((e,i)=>`
            <li class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded-lg">
              <span>${e.name} (${e.qty} g)</span>
              <div class="flex items-center gap-2">
                <span class="text-gray-600">${e.cal}</span>
                <button class="text-red-500 hover:text-red-700" onclick="remove('${day}',${i})">x</button>
              </div>
            </li>
          `).join('')}
        </ul>
      </div>
    `;
  });

  document.getElementById("days").innerHTML = html;
  document.getElementById("weeklyTotal").innerText = "Weekly Total: " + weeklyTotal;
  document.getElementById("summaryTable").innerHTML = summaryHTML;

  days.forEach(day=>{
    const bar = document.getElementById(`${day}-progress`);
    const percent = Math.min((dailyGoals[day]?data[day].reduce((a,b)=>a+b.cal,0)/dailyGoals[day]*100:0),100);
    bar.style.transition = "width 1s ease-in-out";
    setTimeout(()=>{ bar.style.width = `${percent}%`; }, 50);
  });

  // Populate dropdown lists
  days.forEach(day=>{
    const dropdown = document.getElementById(`${day}-dropdown`);
    dropdown.innerHTML = Object.entries(foods).map(([name, cal])=>
      `<div class="dropdown-item" onclick="selectFood('${day}','${name}')">${name} (${cal}/100g)</div>`
    ).join('');
  });
}

function toggleDropdown(day){
  const dropdown = document.getElementById(`${day}-dropdown`);
  dropdown.classList.toggle("hidden");
}

function filterDropdown(day, value){
  const dropdown = document.getElementById(`${day}-dropdown`);
  const items = dropdown.children;
  for(let i=0;i<items.length;i++){
    if(items[i].innerText.toLowerCase().includes(value.toLowerCase())) items[i].style.display="block";
    else items[i].style.display="none";
  }
  dropdown.classList.remove("hidden");
}

function selectFood(day,name){
  document.getElementById(`${day}-input`).value = name;
  document.getElementById(`${day}-dropdown`).classList.add("hidden");
}

function addFood(day){
  const foodName = document.getElementById(`${day}-input`).value;
  let qty = parseInt(document.getElementById(`${day}-grams`).value) || 0;
  const customQty = parseInt(document.getElementById(`${day}-custom-grams`).value);
  if(!isNaN(customQty) && customQty>0) qty = customQty;

  if(foods[foodName]!==undefined){
    if(!data[day]) data[day]=[];
    data[day].push({name:foodName, qty:qty, cal:Math.round(foods[foodName]*qty/100)});
    localStorage.setItem("calories",JSON.stringify(data));
    document.getElementById(`${day}-input`).value="";
    document.getElementById(`${day}-grams`).value = 0;
    document.getElementById(`${day}-custom-grams`).value = "";
    render();
  }
}

function remove(day,i){
  data[day].splice(i,1);
  localStorage.setItem("calories",JSON.stringify(data));
  render();
}

function setDailyGoal(day,val){
  dailyGoals[day]=parseInt(val)||0;
  localStorage.setItem("dailyGoals",JSON.stringify(dailyGoals));
  render();
}

function resetWeek(){
  if(confirm("Reset everything?")){
    data={};
    localStorage.clear();
    render();
  }
}

render();
</script>
</body>
</html>
