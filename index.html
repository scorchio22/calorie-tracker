<!DOCTYPE html>
<html>
<head>
  <title>Calorie Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex flex-col items-center p-4">

<div class="w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-6">Calorie Tracker</h1>

<div id="days" class="space-y-5"></div>

<h2 id="weeklyTotal" class="text-xl text-center mt-6"></h2>

<div class="mt-6 bg-white p-4 rounded-xl shadow">
  <h3 class="font-bold mb-2">Weekly Summary</h3>
  <table class="w-full text-sm">
    <tbody id="summaryTable"></tbody>
  </table>
</div>

</div>

<!-- Sticky reset -->
<div class="fixed bottom-0 w-full flex justify-center p-4 bg-white/70 backdrop-blur">
  <button class="bg-red-500 text-white px-4 py-2 rounded-lg" onclick="resetWeek()">Reset</button>
</div>

<script>
const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const foods = {
  "apple": 52,"banana": 89,"chicken": 165,"egg": 78,"rice": 130,
  "potato": 77,"salmon": 206,"broccoli": 34,"carrot": 41,
  "bread": 265,"cheese": 402,"milk": 61
};

let data = JSON.parse(localStorage.getItem("calories")) || {};
let goals = JSON.parse(localStorage.getItem("goals")) || {};
let prev = {};

function render(){
  let html="", totalWeek=0, summary="";

  days.forEach(day=>{
    let entries=data[day]||[];
    let total=entries.reduce((a,b)=>a+b.cal,0);
    totalWeek+=total;

    let goal=goals[day]||0;
    let pct=goal?Math.min((total/goal)*100,100):0;

    let prevVal=prev[day]||0;
    prev[day]=pct;

    let color="bg-green-400";
    if(pct>=80) color="bg-yellow-400";
    if(pct>=100) color="bg-red-500";

    summary+=`<tr><td>${day}</td><td>${total}</td></tr>`;

    html+=`
    <div class="bg-white p-4 rounded-xl shadow">

      <div class="flex justify-between mb-2">
        <b>${day}</b><span>${total} cal</span>
      </div>

      <input type="number" placeholder="Daily goal"
        class="w-full mb-2 border p-2 rounded"
        value="${goal||''}"
        onchange="setGoal('${day}',this.value)">

      <div class="bg-gray-200 h-3 rounded overflow-hidden">
        <div id="${day}-bar" class="${color} h-3" style="width:${prevVal}%"></div>
      </div>
      <div class="text-xs mb-3">${Math.round(pct)}%</div>

      <!-- FOOD ROW -->
      <div class="space-y-2">

        <!-- Food input -->
        <div class="relative">
          <input id="${day}-food"
            placeholder="Select or search food"
            class="w-full border p-2 rounded"
            onfocus="openDrop('${day}')"
            oninput="filterDrop('${day}')">

          <div id="${day}-drop"
            class="hidden absolute w-full bg-white border rounded max-h-40 overflow-y-auto z-10">
          </div>
        </div>

        <!-- grams + add row -->
        <div class="flex gap-2">
          <select id="${day}-g" class="flex-1 border p-2 rounded">
            ${Array.from({length:21},(_,i)=>`<option>${i*50}</option>`)}
          </select>

          <input id="${day}-cg" placeholder="g"
            class="w-20 border p-2 rounded">

          <button onclick="add('${day}')"
            class="bg-blue-500 text-white px-3 rounded">
            Add
          </button>
        </div>

      </div>

      <ul class="mt-3 text-sm">
        ${entries.map((e,i)=>`
          <li class="flex justify-between">
            ${e.name} (${e.g}g)
            <span>${e.cal}
            <button onclick="del('${day}',${i})">x</button>
            </span>
          </li>`).join("")}
      </ul>

    </div>
    `;
  });

  document.getElementById("days").innerHTML=html;
  document.getElementById("weeklyTotal").innerText="Weekly: "+totalWeek;
  document.getElementById("summaryTable").innerHTML=summary;

  // animate bars
  days.forEach(day=>{
    let el=document.getElementById(day+"-bar");
    let pct=goals[day]?Math.min((data[day]?.reduce((a,b)=>a+b.cal,0)/goals[day])*100,100):0;
    el.style.transition="width .7s";
    setTimeout(()=>el.style.width=pct+"%",50);
  });

  // fill dropdowns
  days.forEach(day=>{
    let d=document.getElementById(day+"-drop");
    d.innerHTML=Object.entries(foods)
      .map(([f,c])=>`<div class="p-2 hover:bg-gray-100"
        onclick="pick('${day}','${f}')">
        ${f} (${c}/100g)
      </div>`).join("");
  });
}

function openDrop(day){
  document.getElementById(day+"-drop").classList.remove("hidden");
}

function filterDrop(day){
  let val=document.getElementById(day+"-food").value.toLowerCase();
  let items=document.getElementById(day+"-drop").children;
  for(let i=0;i<items.length;i++){
    items[i].style.display=items[i].innerText.toLowerCase().includes(val)?"block":"none";
  }
}

function pick(day,f){
  document.getElementById(day+"-food").value=f;
  document.getElementById(day+"-drop").classList.add("hidden");
}

function add(day){
  let f=document.getElementById(day+"-food").value;
  let g=parseInt(document.getElementById(day+"-cg").value)||parseInt(document.getElementById(day+"-g").value);

  if(!foods[f]||!g) return;

  if(!data[day]) data[day]=[];
  data[day].push({name:f,g,cal:Math.round(foods[f]*g/100)});
  localStorage.setItem("calories",JSON.stringify(data));

  render();
}

function del(day,i){
  data[day].splice(i,1);
  localStorage.setItem("calories",JSON.stringify(data));
  render();
}

function setGoal(day,v){
  goals[day]=parseInt(v)||0;
  localStorage.setItem("goals",JSON.stringify(goals));
  render();
}

function resetWeek(){
  data={}; localStorage.clear(); render();
}

render();
</script>
</body>
</html>
